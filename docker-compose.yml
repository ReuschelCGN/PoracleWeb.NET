services:
  poracleweb.net:
    container_name: poracleweb.net
    # image: ghcr.io/pgan-dev/poracleweb.net:latest
    # Alternatives:
    image: poracleweb.net:latest             # Use a locally built image
    # build:                                   # Build from source directly
    #   context: .
    #   dockerfile: Dockerfile
    ports:
      - "8082:8080"
    environment:
      # Database (Poracle — existing PoracleJS database, read/write)
      - ConnectionStrings__PoracleDb=Server=${DB_HOST:-host.docker.internal};Port=${DB_PORT:-3309};Database=${DB_NAME:-poracle};User=${DB_USER:-root};Password=${DB_PASSWORD};AllowZeroDateTime=true;ConvertZeroDateTime=true
      # PoracleWeb DB (app-owned database for user geofences — separate from Poracle DB)
      - ConnectionStrings__PoracleWebDb=Server=${WEB_DB_HOST:-host.docker.internal};Port=${WEB_DB_PORT:-3309};Database=${WEB_DB_NAME:-poracle_web};User=${WEB_DB_USER:-root};Password=${WEB_DB_PASSWORD};AllowZeroDateTime=true;ConvertZeroDateTime=true
      - ConnectionStrings__ScannerDb=${SCANNER_DB_CONNECTION:-}
      # JWT
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=Pgan.PoracleWebNet
      - Jwt__Audience=Pgan.PoracleWebNet.App
      # Discord OAuth2
      - Discord__ClientId=${DISCORD_CLIENT_ID}
      - Discord__ClientSecret=${DISCORD_CLIENT_SECRET}
      - Discord__BotToken=${DISCORD_BOT_TOKEN:-}
      - Discord__GuildId=${DISCORD_GUILD_ID:-}
      # Forum channel for geofence submission threads (optional)
      - Discord__GeofenceForumChannelId=${DISCORD_GEOFENCE_FORUM_CHANNEL_ID:-}
      # Telegram
      - Telegram__Enabled=${TELEGRAM_ENABLED:-false}
      - Telegram__BotToken=${TELEGRAM_BOT_TOKEN:-}
      - Telegram__BotUsername=${TELEGRAM_BOT_USERNAME:-}
      # Poracle API
      - Poracle__ApiAddress=${PORACLE_API_ADDRESS}
      - Poracle__ApiSecret=${PORACLE_API_SECRET}
      - Poracle__AdminIds=${PORACLE_ADMIN_IDS}
      # Poracle Multi-Server Restart
      - Poracle__Servers__0__Name=Main
      - Poracle__Servers__0__Host=${PORACLE_SERVER_1_HOST:-}
      - Poracle__Servers__0__ApiAddress=${PORACLE_SERVER_1_API:-}
      - Poracle__Servers__0__SshUser=${PORACLE_SERVER_1_SSH_USER:-root}
      - Poracle__Servers__0__RestartCommand=${PORACLE_SERVER_1_RESTART_CMD:-pm2 restart all}
      - Poracle__Servers__0__GroupMapPath=${PORACLE_SERVER_1_GROUP_MAP:-/source/PoracleJS/config/group_map.json}
      - Poracle__Servers__1__Name=Secondary
      - Poracle__Servers__1__Host=${PORACLE_SERVER_2_HOST:-}
      - Poracle__Servers__1__ApiAddress=${PORACLE_SERVER_2_API:-}
      - Poracle__Servers__1__SshUser=${PORACLE_SERVER_2_SSH_USER:-root}
      - Poracle__Servers__1__RestartCommand=${PORACLE_SERVER_2_RESTART_CMD:-pm2 restart all}
      - Poracle__Servers__1__GroupMapPath=${PORACLE_SERVER_2_GROUP_MAP:-/source/PoracleJS/config/group_map.json}
      - Poracle__SshKeyPath=${PORACLE_SSH_KEY_PATH:-/app/ssh_key}
      # Koji Geofence API (required for custom geofences: region detection, promotion to public)
      - Koji__ApiAddress=${KOJI_API_ADDRESS:-}
      - Koji__BearerToken=${KOJI_BEARER_TOKEN:-}
      - Koji__ProjectId=${KOJI_PROJECT_ID:-0}  # Koji project ID for admin-promoted geofences
      - Koji__ProjectName=${KOJI_PROJECT_NAME:-}  # Koji project name for Poracle format endpoint
      # CORS (comma-separated origins, leave empty to allow all)
      - Cors__AllowedOrigins__0=${CORS_ORIGIN:-}
      # DTS source path (inside container)
      - DTS_SOURCE_DIR=/poracle-config
      # Data directory for avatar cache, DTS cache, etc.
      - DATA_DIR=/app/data
    volumes:
      # Persist avatar cache across restarts
      - ./data:/app/data
      # Mount Poracle config for DTS templates (read-only)
      - ${PORACLE_CONFIG_DIR:-./data}:/poracle-config:ro
      # Mount SSH key for Poracle server restart (read-only, optional)
      - ${SSH_KEY_PATH:-./data/ssh_key}:/app/ssh_key:ro
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
